<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduQuery Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background:#0f172a; color:#fff; font-family:sans-serif; }
        .hidden { display:none; }
    </style>
</head>

<body class="p-6">

    <h1 class="text-3xl mb-6 text-center text-blue-400">EduQuery Quiz</h1>

    <div id="setup" class="max-w-md mx-auto bg-slate-800 p-6 rounded-lg">
        <label class="block mb-2">Select Subject:</label>
        <select id="subject" class="w-full p-2 mb-4 bg-slate-700 rounded">
            <option value="islamic">Islamic</option>
            <option value="general_knowledge">General Knowledge</option>
            <option value="current_affairs">Current Affairs</option>
            <option value="maths">Maths</option>
            <option value="english">English</option>
        </select>

        <label class="block mb-2">Number of Questions (5-100):</label>
        <input type="number" id="qCount" value="10" min="5" max="100" class="w-full p-2 mb-6 bg-slate-700 rounded">

        <button onclick="startQuiz()" class="w-full bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded font-bold">Start Quiz</button>
    </div>

    <div id="quiz" class="hidden max-w-2xl mx-auto">
        <div class="flex justify-between mb-4 text-slate-400">
            <span id="progress"></span>
            <span id="currentScore"></span>
        </div>
        <h2 id="qText" class="text-xl mb-6 font-semibold"></h2>
        <div id="opts" class="grid gap-3"></div>
    </div>

    <div id="result" class="hidden text-center">
        <h2 class="text-4xl mb-2">Quiz Finished!</h2>
        <h2 id="scoreText" class="text-2xl text-blue-400"></h2>
        <button onclick="location.reload()" class="mt-6 bg-slate-700 px-6 py-2 rounded hover:bg-slate-600">Restart</button>
    </div>

<script>
    let data = [], idx = 0, score = 0;

    function shuffle(a) {
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    async function startQuiz() {
        const sub = document.getElementById('subject').value;
        const count = parseInt(document.getElementById('qCount').value);

        // Validation
        if (isNaN(count) || count < 5 || count > 100) {
            alert("Please enter a number between 5 and 100.");
            return;
        }

        try {
            // Fetching JSON instead of CSV
            const res = await fetch(`./${sub}.json`);
            if (!res.ok) throw new Error("Could not find the JSON file.");

            const rawData = await res.json();

            // Expected JSON structure: 
            // [{"question": "...", "wrong_choices": ["", "", ""], "correct_answer": "..."}]
            data = rawData.map(item => {
                const options = shuffle([...item.wrong_choices, item.correct_answer]);
                return {
                    q: item.question,
                    opts: options,
                    correct: item.correct_answer
                };
            });

            // Shuffle the entire question pool and slice to user's requested count
            data = shuffle(data).slice(0, count);

            if (data.length === 0) throw new Error("No valid questions found in JSON.");

            document.getElementById('setup').classList.add('hidden');
            document.getElementById('quiz').classList.remove('hidden');

            showQ();

        } catch (e) {
            alert("Error loading quiz: " + e.message);
            console.error(e);
        }
    }

    function showQ() {
        const q = data[idx];
        document.getElementById('progress').innerText = `Question ${idx + 1} of ${data.length}`;
        document.getElementById('qText').innerText = q.q;

        const div = document.getElementById('opts');
        div.innerHTML = '';

        q.opts.forEach(o => {
            const b = document.createElement('button');
            b.innerText = o;
            b.className = 'block w-full text-left bg-slate-700 p-4 rounded transition hover:bg-slate-600 border border-slate-600';
            b.onclick = () => answer(o);
            div.appendChild(b);
        });
    }

    function answer(sel) {
        if (sel === data[idx].correct) score++;
        idx++;

        if (idx < data.length) {
            showQ();
        } else {
            finish();
        }
    }

    function finish() {
        document.getElementById('quiz').classList.add('hidden');
        document.getElementById('result').classList.remove('hidden');
        const percentage = Math.round((score / data.length) * 100);
        document.getElementById('scoreText').innerText = `Your Score: ${score} / ${data.length} (${percentage}%)`;
    }
</script>

</body>
</html>
